<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <title>Interactive Skills Quiz</title>
</head>
<body>
<header id="title-header">
  <h1>General Knowledge Quiz</h1>
  <p>Test your knowledge with these questions</p>
</header>

<main>
  <section id="quiz">
    <form id="quiz-form">
      <!--Question 1 -->
      <p class="questionnaire">What is the capital of France?</p>
      <ol>
        <li>
          <input type="radio" id="Paris" name="q1" value="a" required>
          <label for="Paris">Paris</label>
        </li>
        <li>
          <input type="radio" id="Berlin" name="q1" value="b">
          <label for="Berlin">Berlin</label>
        </li>
        <li>
          <input type="radio" id="London" name="q1" value="c">
          <label for="London">London</label>
        </li>
        <li>
          <input type="radio" id="Madrid" name="q1" value="d">
          <label for="Madrid">Madrid</label>
        </li>
      </ol>

      <!--Question 2 -->
      <p class="questionnaire">Which planet is known as the Red Planet?</p>
      <ol>
        <li>
          <input type="radio" id="Venus" name="q2" value="a" required>
          <label for="Venus">Venus</label>
        </li>
        <li>
          <input type="radio" id="Mars" name="q2" value="b">
          <label for="Mars">Mars</label>
        </li>
        <li>
          <input type="radio" id="Jupiter" name="q2" value="c">
          <label for="Jupiter">Jupiter</label>
        </li>
      </ol>

      <!--Question 3 -->
      <p class="questionnaire">What is the largest ocean on Earth?</p>
      <ol>
        <li>
          <input type="radio" id="Atlantic Ocean" name="q3" value="Atlantic Ocean" required>
          <label for="Atlantic Ocean">Atlantic Ocean</label>
        </li>
        <li>
          <input type="radio" id="Indian Ocean" name="q3" value="Indian Ocean">
          <label for="Indian Ocean">Indian Ocean</label>
        </li>
        <li>
          <input type="radio" id="Pacific Ocean" name="q3" value="Pacific Ocean">
          <label for="Pacific Ocean">Pacific Ocean</label>
        </li>
        <li>
          <input type="radio" id="Arctic Ocean" name="q3" value="Arctic Ocean">
          <label for="Arctic Ocean">Arctic Ocean</label>
        </li>
      </ol>
      <button type="submit" id="fact-btn">Submit Answers</button>
    </form>
    <span id="result"></span>
  </section>

</main>

</body>
</html>
